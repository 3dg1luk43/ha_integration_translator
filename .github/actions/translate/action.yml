name: "HA Integration Translate"
description: "Translate Home Assistant integration locale files and optional card TRANSLATIONS object"
author: "3dg1luk43"

inputs:
  translations_dir:
    description: "Path to translations directory (contains en.json)"
    required: true
  languages:
    description: "Space-separated language codes (example: 'de fr es'). Leave empty to process existing files."
    required: false
    default: ""
  all_languages:
    description: "Generate for all Home Assistant supported languages"
    required: false
    default: "false"
  retranslate:
    description: "Retranslate already translated keys"
    required: false
    default: "false"
  card_file:
    description: "Optional card JS path containing const TRANSLATIONS = { ... }"
    required: false
    default: ""
  python_version:
    description: "Python version used in runner setup"
    required: false
    default: "3.11"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install requests deep-translator

    - name: Run translator
      shell: bash
      env:
        TRANSLATIONS_DIR: ${{ inputs.translations_dir }}
        LANGUAGES: ${{ inputs.languages }}
        ALL_LANGUAGES: ${{ inputs.all_languages }}
        RETRANSLATE: ${{ inputs.retranslate }}
        CARD_FILE: ${{ inputs.card_file }}
      run: |
        set -euo pipefail

        REPO_ROOT="$(cd "$GITHUB_ACTION_PATH/../../.." && pwd)"
        SCRIPT_PATH="$REPO_ROOT/translate.py"
        if [[ ! -f "$SCRIPT_PATH" ]]; then
          echo "translate.py not found at $SCRIPT_PATH"
          exit 1
        fi

        CMD=(python "$SCRIPT_PATH" "$TRANSLATIONS_DIR")

        if [[ -n "$LANGUAGES" ]]; then
          read -r -a LANG_ARRAY <<<"$LANGUAGES"
          CMD+=("${LANG_ARRAY[@]}")
        fi

        if [[ "$ALL_LANGUAGES" == "true" ]]; then
          CMD+=(--all)
        fi

        if [[ "$RETRANSLATE" == "true" ]]; then
          CMD+=(--retranslate)
        fi

        if [[ -n "$CARD_FILE" ]]; then
          CMD+=(--card-file "$CARD_FILE")
        fi

        echo "Running: ${CMD[*]}"
        "${CMD[@]}"
